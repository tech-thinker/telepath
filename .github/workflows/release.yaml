name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: [1.22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: Set Release Version
        id: set_release_version
        run: |
          echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Install dependencies
        run: make tidy

      - name: Build
        run: |
          export AppVersion="${{ env.RELEASE_VERSION }}"
          echo "Building version: $AppVersion"
          make dist

      - name: Archive build artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: build
          path: build
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download build artifacts
        uses: actions/download-artifact@v4.2.1
        with:
          name: build
          path: build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./build/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Set Docker image tag
        id: image_tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          fi
      - name: Build Docker image
        run: |
          docker build \
            -f Dockerfile \
            --build-arg="VERSION=${IMAGE_TAG}" --build-arg="COMMIT=$(git rev-parse --short HEAD)" --build-arg="BUILDDATE=$(date +%Y-%m-%d)" \
            -t ghcr.io/${{ github.repository_owner }}/telepath:${IMAGE_TAG} .

      - name: Push Docker image
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/telepath:${IMAGE_TAG}
